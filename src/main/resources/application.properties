spring.application.name=FoodExpressMVC

server.port=8081

spring.thymeleaf.cache=false

# H2 en memoria para usuarios/roles de la app MVC (usar modo MySQL para aceptar AUTO_INCREMENT en schema.sql)
spring.datasource.url=jdbc:h2:mem:mvc-foodExpress;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Espera a que Hibernate cree las tablas, y solo despuÈs ejecuta los scripts SQL
spring.jpa.defer-datasource-initialization=true
#spring.sql.init.platform=mysql

## Propiedades propias
api.base-url=http://localhost:8082
api.api-url=http://localhost:8082/api
api.auth-url=http://localhost:8082/auth/login
api.credencial=admin
