spring.application.name=FoodExpressMVC

server.port=8081

spring.thymeleaf.cache=false

# H2 en memoria para usuarios/roles de la app MVC
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.datasource.username=sa
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Espera a que Hibernate cree las tablas, y solo despuÈs ejecuta los scripts SQL
spring.jpa.defer-datasource-initialization=true

## Propiedades propias
api.base-url=http://localhost:8082
api.api-url=http://localhost:8082/api
api.auth-url=http://localhost:8082/auth/login

api.auth-username=admin
api.auth-password=melola

